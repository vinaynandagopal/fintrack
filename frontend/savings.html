<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Savings - FinTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">FinTrack</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="transactions.html">Transactions</a>
                <a class="nav-link" href="budgets.html">Budgets</a>
                <a class="nav-link active" href="savings.html">Savings</a>
                <button class="btn btn-light btn-sm ms-2" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h1 class="h3 mb-4">Savings goals</h1>

        <div id="alertBox"></div>

        <div class="card page-card mb-4">
            <div class="card-body">
                <h2 class="h5 mb-3">Create savings goal</h2>

                <form id="savingsForm" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label" for="goalName">Goal name</label>
                        <input class="form-control" id="goalName" type="text" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label" for="targetAmount">Target amount</label>
                        <input class="form-control" id="targetAmount" type="number" min="0.01" step="0.01" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label" for="currentAmount">Current amount</label>
                        <input class="form-control" id="currentAmount" type="number" min="0" step="0.01" value="0">
                    </div>

                    <div class="col-md-3">
                        <label class="form-label" for="targetDate">Target date</label>
                        <input class="form-control" id="targetDate" type="date">
                    </div>

                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">Save goal</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="row g-3" id="goalsContainer"></div>
    </main>

    <script src="js/api.js"></script>
    <script>
        requireAuth();

        function money(value) {
            return `$${Number(value).toFixed(2)}`;
        }

        async function loadGoals() {
            const response = await apiRequest("/savings-goals");

            const cards = response.data.map(goal => {
                const target = Number(goal.target_amount);
                const current = Number(goal.current_amount);
                const percentage = target > 0 ? Math.min((current / target) * 100, 100) : 0;

                return `
                    <div class="col-md-4">
                        <div class="card page-card h-100">
                            <div class="card-body">
                                <h2 class="h5">${goal.goal_name}</h2>
                                <p class="text-muted mb-2">Target date: ${goal.target_date || "Not set"}</p>
                                <p class="mb-1">${money(current)} of ${money(target)}</p>
                                <div class="progress">
                                    <div class="progress-bar" style="width: ${percentage}%">${percentage.toFixed(0)}%</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");

            document.getElementById("goalsContainer").innerHTML = cards || `
                <div class="col-12">
                    <div class="alert alert-info">No savings goals yet.</div>
                </div>
            `;
        }

        document.getElementById("savingsForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            await apiRequest("/savings-goals", {
                method: "POST",
                body: JSON.stringify({
                    goal_name: document.getElementById("goalName").value,
                    target_amount: document.getElementById("targetAmount").value,
                    current_amount: document.getElementById("currentAmount").value || 0,
                    target_date: document.getElementById("targetDate").value || null
                })
            });

            event.target.reset();
            document.getElementById("currentAmount").value = 0;
            await loadGoals();
        });

        loadGoals().catch(error => {
            document.getElementById("alertBox").innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
        });
    </script>
</body>
</html>
