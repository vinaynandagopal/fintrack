<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Register - FinTrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <main class="auth-wrapper">
        <div class="container">
            <div class="card auth-card page-card">
                <div class="card-body p-4">
                    <h1 class="h3 mb-2">Create account</h1>
                    <p class="text-muted mb-4">Start tracking your personal finances.</p>

                    <div id="alertBox"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label" for="fullName">Full name</label>
                            <input class="form-control" id="fullName" type="text" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" type="email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" type="password" minlength="6" required>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Register</button>
                    </form>

                    <p class="mt-3 mb-0 text-center">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById("registerForm");
        const alertBox = document.getElementById("alertBox");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            alertBox.innerHTML = "";

            try {
                const response = await apiRequest("/auth/register", {
                    method: "POST",
                    body: JSON.stringify({
                        full_name: document.getElementById("fullName").value,
                        email: document.getElementById("email").value,
                        password: document.getElementById("password").value
                    })
                });

                setAuth(response.data.token, response.data.user);
                window.location.href = "dashboard.html";
            } catch (error) {
                alertBox.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
